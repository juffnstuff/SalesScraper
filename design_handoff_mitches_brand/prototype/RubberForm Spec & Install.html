<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>RubberForm — Spec Sheet & Install Guide</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Alfa+Slab+One&family=Bowlby+One&family=Bowlby+One+SC&family=Special+Elite&family=Pacifico&family=Yellowtail&family=Kaushan+Script&family=Bevan&display=swap" rel="stylesheet">

<style>
  :root {
    --rf-yellow: #f9b716;
    --rf-orange: #db9c28;
    --rf-copper: #bd6c28;
    --rf-charcoal: #18181c;
    --rf-olive: #455928;
    --rf-grey: #cccccc;
    --rf-paper: #f5f3ee;
    --rf-paper-line: #d8d4ca;
  }
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Inter Tight', sans-serif; color: #18181c; }
  * { box-sizing: border-box; }

  /* shared utility classes scoped to artboards */
  .rf-display { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.01em; font-weight: 700; }
  .rf-mono { font-family: 'JetBrains Mono', monospace; }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="logo.jsx"></script>
<script type="text/babel" src="product-data.jsx"></script>
<script type="text/babel" src="safe-variant.jsx"></script>
<script type="text/babel" src="bold-variant.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "darkMode": true,
    "activeTab": "spec"
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const [safeTab, setSafeTab] = React.useState('spec');
    const [boldTab, setBoldTab] = React.useState('spec');

    return (
      <React.Fragment>
        <DesignCanvas>
          <DCSection
            id="variants"
            title="Trackout Mats — Spec Sheet & Install Guide"
            subtitle="Two directions for high-value, niche product documentation. Click the tabs in each artboard to switch between Spec Sheet and Install Guide.">
            <DCArtboard id="safe" label="A · Safe — Engineering doc, B2B credibility first" width={1100} height={1500}>
              <SafeVariant tab={safeTab} setTab={setSafeTab} dark={t.darkMode} />
            </DCArtboard>
            <DCArtboard id="bold" label="B · Bold — Rebel-brand, editorial, high contrast" width={1100} height={1500}>
              <BoldVariant tab={boldTab} setTab={setBoldTab} />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>

        <TweaksPanel>
          <TweakSection label="Theme (Variant A only)" />
          <TweakToggle label="Dark mode — Safe variant" value={t.darkMode}
                       onChange={(v) => setTweak('darkMode', v)} />
          <TweakSection label="Jump to" />
          <TweakRadio label="Safe variant tab" value={safeTab}
                      options={['spec', 'install']}
                      onChange={(v) => setSafeTab(v)} />
          <TweakRadio label="Bold variant tab" value={boldTab}
                      options={['spec', 'install']}
                      onChange={(v) => setBoldTab(v)} />
        </TweaksPanel>
      </React.Fragment>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
